<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAULT STORE | الفخامة الملكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-mauve: #8a2be2;
            --dark-bg: #0a0a0b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-glow: 0 0 20px rgba(138, 43, 226, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            line-height: 1.6;
            background-image: radial-gradient(circle at top right, #1a0b2e 0%, #0a0a0b 40%);
        }

        /* الهيدر الاحترافي */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(10, 10, 11, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(to left, #fff, var(--primary-mauve));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* الحاوية الرئيسية */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .hero-section {
            text-align: center;
            margin-bottom: 60px;
        }

        .hero-section h2 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .hero-section p {
            color: #b0b0b0;
            font-size: 18px;
        }

        /* شبكة المنتجات */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-mauve);
            box-shadow: var(--accent-glow);
        }

        .product-card img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .product-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .price-tag {
            font-size: 24px;
            color: var(--primary-mauve);
            font-weight: bold;
            margin: 15px 0;
        }

        .buy-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, var(--primary-mauve), #bc13fe);
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .buy-btn:hover {
            filter: brightness(1.2);
            box-shadow: 0 5px 15px rgba(138, 43, 226, 0.4);
        }

        /* طرق الدفع - دمج سلة وزد */
        .payment-methods {
            margin-top: 80px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
        }

        .payment-icons {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 30px;
            filter: grayscale(100%) brightness(200%);
            opacity: 0.6;
        }

        .payment-icons img {
            height: 35px;
            transition: 0.3s;
        }

        .payment-icons img:hover {
            filter: grayscale(0%);
            opacity: 1;
        }

        @media (max-width: 768px) {
            .hero-section h2 { font-size: 28px; }
            .products-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">VAULT STORE</div>
    <div class="nav-links">
        <button style="background:none; border:1px solid var(--primary-mauve); color:white; padding:8px 20px; border-radius:10px; cursor:pointer;">تسجيل الدخول</button>
    </div>
</nav>

<div class="container">
    <div class="hero-section">
        <h2>متجر فولت | وجهتك لخدمات الديسكورد</h2>
        <p>تسليم فوري، ضمان ذهبي، وفخامة لا تنتهي</p>
    </div>

    <div class="products-grid">
        <div class="product-card">
            <img src="https://i.imgur.com/your-image-1.png" alt="نيترو شهر">
            <div class="product-title">ديسكورد نيترو قيمينق (شهر)</div>
            <div class="price-tag">15.00 ر.س</div>
            <button class="buy-btn">أضف للسلة 🛒</button>
        </div>

        <div class="product-card">
            <img src="https://i.imgur.com/your-image-2.png" alt="نيترو 3 أشهر">
            <div class="product-title">ديسكورد نيترو قيمينق (3 أشهر)</div>
            <div class="price-tag">45.00 ر.س</div>
            <button class="buy-btn">أضف للسلة 🛒</button>
        </div>
    </div>

    <div class="payment-methods">
        <h3>طرق دفع آمنة ومعتمدة</h3>
        <div class="payment-icons">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" alt="Mastercard">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" alt="Visa">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/Apple_Pay_logo.svg" alt="Apple Pay">
            <img src="https://www.mada.com.sa/sites/default/files/2018-05/mada_logo_0.png" alt="Mada" style="height: 25px;">
        </div>
    </div>
</div>

<footer style="text-align: center; padding: 40px; color: #555;">
    جميع الحقوق محفوظة لمتجر فولت © 2026
</footer>

</body>
</html>
