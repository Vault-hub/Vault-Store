<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAULT ULTIMATE | النظام المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #8a2be2; --bg: #080808; --card: #151515; --text: #fff; --grad: linear-gradient(135deg, #8a2be2, #4b0082); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: 0.3s ease; }
        body { background: var(--bg); color: var(--text); }

        /* الهيدر */
        header { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 26px; font-weight: 900; color: var(--main); text-transform: uppercase; }
        .btn-top { background: var(--grad); border: none; padding: 8px 20px; border-radius: 12px; color: #fff; cursor: pointer; font-weight: bold; }

        /* التبويبات (الأقسام) */
        .tabs { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
        .tab-btn { background: #222; border: 1px solid #333; padding: 10px 25px; border-radius: 30px; color: #aaa; cursor: pointer; }
        .tab-btn.active { background: var(--main); color: #fff; border-color: var(--main); box-shadow: 0 0 15px var(--main); }

        /* نظام الصفحات */
        .page { display: none; padding: 20px; }
        .active-page { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* كروت المنتجات */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        .product-card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid #222; text-align: center; position: relative; }
        .product-card:hover { border-color: var(--main); box-shadow: 0 10px 30px rgba(138,43,226,0.3); }
        .price { font-size: 32px; color: var(--main); font-weight: 900; margin: 15px 0; }
        .buy-btn { width: 100%; padding: 12px; border-radius: 15px; border: none; background: var(--grad); color: #fff; font-weight: bold; cursor: pointer; }

        /* لوحة التحكم (المالك) */
        .admin-panel { max-width: 900px; margin: 40px auto; background: #111; padding: 30px; border-radius: 25px; border: 1px solid #333; }
        .input-group { margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 8px; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; }
        .save-btn { background: #2ecc71; border: none; padding: 15px; width: 100%; border-radius: 12px; color: #fff; font-weight: bold; cursor: pointer; font-size: 18px; }

        /* قسم الدفع المطور */
        .payment-box { background: #000; padding: 40px; border-radius: 30px; text-align: center; border: 1px solid #222; margin-top: 50px; }
        .pay-methods { display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; margin-top: 25px; }
        .pay-card { background: #fff; padding: 10px 20px; border-radius: 12px; display: flex; align-items: center; justify-content: center; width: 120px; height: 60px; }
        .pay-card img { max-width: 100%; max-height: 100%; }

        /* تنبيهات */
        .toast { position: fixed; bottom: 20px; right: 20px; background: var(--main); padding: 15px 30px; border-radius: 10px; display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">VAULT STORE</div>
    <div>
        <button class="btn-top" onclick="switchPage('store')">المتجر</button>
        <button class="btn-top" onclick="switchPage('login')" style="background: #222; margin-right: 10px;">لوحة المالك ⚙️</button>
    </div>
</header>

<div id="store-page" class="page active-page">
    <div class="tabs">
        <button class="tab-btn active" onclick="filterTab('all', this)">الكل</button>
        <button class="tab-btn" onclick="filterTab('nitro', this)">نيترو</button>
        <button class="tab-btn" onclick="filterTab('games', this)">ألعاب</button>
        <button class="tab-btn" onclick="filterTab('cards', this)">بطاقات</button>
    </div>

    <div id="products-grid" class="grid">
        </div>

    <div class="payment-box">
        <h3>طرق الدفع الآمنة</h3>
        <div class="pay-methods">
            <div class="pay-card"><img src="https://www.mada.com.sa/sites/default/files/2018-05/mada_logo_0.png" alt="Mada"></div>
            <div class="pay-card"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/Apple_Pay_logo.svg" alt="Apple Pay"></div>
            <div class="pay-card"><img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" alt="Visa"></div>
            <div class="pay-card"><img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Visa_Logo.png" alt="STC Pay" style="filter: hue-rotate(90deg);"></div>
        </div>
    </div>
</div>

<div id="login-page" class="page">
    <div style="max-width: 400px; margin: 100px auto; background: #111; padding: 30px; border-radius: 20px; border: 1px solid var(--main);">
        <h2 style="text-align: center; margin-bottom: 20px;">دخول المالك</h2>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button class="buy-btn" style="margin-top: 15px;" onclick="validateLogin()">دخول اللوحة</button>
    </div>
</div>

<div id="admin-page" class="page">
    <div class="admin-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2>إدارة المنتجات | فولت</h2>
            <button class="btn-top" onclick="switchPage('store')" style="background: red;">خروج</button>
        </div>

        <div class="input-group">
            <label>اسم المنتج</label>
            <input type="text" id="p-name" placeholder="مثال: نيترو شهر">
        </div>
        <div class="input-group">
            <label>السعر (ريال)</label>
            <input type="number" id="p-price" placeholder="15">
        </div>
        <div class="input-group">
            <label>القسم</label>
            <select id="p-cat">
                <option value="nitro">نيترو</option>
                <option value="games">ألعاب</option>
                <option value="cards">بطاقات</option>
            </select>
        </div>
        <button class="save-btn" onclick="addProduct()">إضافة المنتج للمتجر ✅</button>

        <div style="margin-top: 40px;">
            <h3>المنتجات الحالية</h3>
            <div id="admin-list" style="margin-top: 15px;"></div>
        </div>
    </div>
</div>

<div id="toast" class="toast">تمت العملية بنجاح!</div>

<script>
    // نظام البيانات المحمي (البريد والباسورد)
    const owners = ["nnaiif376@gmail.com", "aawaf50@gmail.com"];
    const password = "Open208!10017@27@9";

    // قاعدة بيانات المنتجات (مبدئياً)
    let products = [
        { id: 1, name: "نيترو قيمينق شهر", price: 15, cat: "nitro" },
        { id: 2, name: "نيترو قيمينق 3 أشهر", price: 45, cat: "nitro" }
    ];

    function switchPage(pId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pId + '-page').classList.add('active-page');
        if(pId === 'store') renderProducts();
        if(pId === 'admin') renderAdminList();
    }

    function validateLogin() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        if(owners.includes(e) && p === password) {
            switchPage('admin');
        } else {
            alert("خطأ في بيانات المالك يا فنطل!");
        }
    }

    function renderProducts(filter = 'all') {
        const grid = document.getElementById('products-grid');
        grid.innerHTML = '';
        const filtered = filter === 'all' ? products : products.filter(p => p.cat === filter);
        filtered.forEach(p => {
            grid.innerHTML += `
                <div class="product-card">
                    <h3>${p.name}</h3>
                    <div class="price">${p.price} ر.س</div>
                    <button class="buy-btn">شراء الآن 💳</button>
                </div>`;
        });
    }

    function addProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const cat = document.getElementById('p-cat').value;
        if(name && price) {
            products.push({ id: Date.now(), name, price, cat });
            renderAdminList();
            showToast();
            // مسح الحقول
            document.getElementById('p-name').value = '';
            document.getElementById('p-price').value = '';
        }
    }

    function deleteProduct(id) {
        products = products.filter(p => p.id !== id);
        renderAdminList();
    }

    function renderAdminList() {
        const list = document.getElementById('admin-list');
        list.innerHTML = '';
        products.forEach(p => {
            list.innerHTML += `
                <div style="background:#000; padding:15px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between; border:1px solid #222;">
                    <span>${p.name} - ${p.price} ريال (${p.cat})</span>
                    <button onclick="deleteProduct(${p.id})" style="color:red; background:none; border:none; cursor:pointer;">حذف ❌</button>
                </div>`;
        });
    }

    function filterTab(cat, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderProducts(cat);
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    // تشغيل المتجر عند الفتح
    window.onload = () => renderProducts();
</script>

</body>
</html>
