<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAULT STORE | متجر فولت</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-mauve: #8a2be2;
            --dark-black: #050505;
            --card-glass: rgba(255, 255, 255, 0.03);
            --border-color: rgba(138, 43, 226, 0.2);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--dark-black);
            color: white;
            background-image: radial-gradient(circle at top right, #1a0b2e 0%, #050505 50%);
            min-height: 100vh;
        }

        /* الهيدر */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px); border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-size: 30px; font-weight: 900; color: var(--main-mauve); text-shadow: 0 0 10px var(--main-mauve); }

        /* الحاوية */
        .main-container { max-width: 1200px; margin: 40px auto; padding: 20px; }

        /* كروت المنتجات */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }

        .card {
            background: var(--card-glass); border: 1px solid var(--border-color);
            border-radius: 25px; padding: 25px; text-align: center;
            transition: 0.4s; position: relative;
        }

        .card:hover { transform: translateY(-10px); border-color: var(--main-mauve); box-shadow: 0 10px 30px rgba(138, 43, 226, 0.2); }

        .card h3 { font-size: 22px; margin-bottom: 10px; }
        .price { font-size: 28px; color: var(--main-mauve); font-weight: 900; margin: 15px 0; }

        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 12px;
            background: linear-gradient(45deg, var(--main-mauve), #6a1b9a);
            color: white; font-weight: bold; cursor: pointer; font-size: 18px;
            transition: 0.3s;
        }

        .btn:active { transform: scale(0.95); }

        /* قسم الدفع */
        .checkout-box {
            margin-top: 50px; background: rgba(138, 43, 226, 0.05);
            border-radius: 20px; padding: 30px; border: 1px dashed var(--main-mauve);
            text-align: center;
        }

        .payment-methods img { height: 30px; margin: 0 10px; opacity: 0.7; filter: grayscale(1); }

        /* لوحة التحكم المخفية (للمالك فقط) */
        .admin-info {
            margin-top: 20px; font-size: 12px; color: #333; text-align: left;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">VAULT STORE</div>
    <div id="cart-count" style="background: var(--main-mauve); padding: 5px 15px; border-radius: 20px; font-weight: bold;">السلة: 0</div>
</header>

<div class="main-container">
    <div class="grid">
        <div class="card">
            <div style="font-size: 50px; margin-bottom: 15px;">💎</div>
            <h3>ديسكورد نيترو قيمينق (شهر)</h3>
            <div class="price">15.00 ر.س</div>
            <button class="btn" onclick="addToCart('نيترو شهر', 15)">إضافة للسلة 🛒</button>
        </div>

        <div class="card">
            <div style="font-size: 50px; margin-bottom: 15px;">👑</div>
            <h3>ديسكورد نيترو قيمينق (3 أشهر)</h3>
            <div class="price">45.00 ر.س</div>
            <button class="btn" onclick="addToCart('نيترو 3 أشهر', 45)">إضافة للسلة 🛒</button>
        </div>
    </div>

    <div class="checkout-box">
        <h3>طرق الدفع المتاحة</h3>
        <p style="color: #bbb; margin-bottom: 15px;">مدعوم بواسطة نظام فولت الآمن</p>
        <div class="payment-methods">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/Apple_Pay_logo.svg" alt="Apple Pay">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" alt="Visa">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" alt="Mastercard">
        </div>
        <button class="btn" style="margin-top: 20px; max-width: 300px;" onclick="checkout()">إتمام الطلب الآن</button>
    </div>

    <div class="admin-info">
        Connected to: nnaiif376@gmail.com | aawaf50@gmail.com <br>
        Auth: Encrypted System (Open208!...)
    </div>
</div>

<script>
    let cartTotal = 0;
    let itemsCount = 0;

    function addToCart(name, price) {
        itemsCount++;
        cartTotal += price;
        document.getElementById('cart-count').innerText = "السلة: " + itemsCount + " (" + cartTotal + " ر.س)";
        alert("تم إضافة " + name + " بنجاح!");
    }

    function checkout() {
        if (cartTotal === 0) {
            alert("سلتك فاضية يا وحش!");
        } else {
            alert("سيتم توجيهك لبوابة الدفع الآمنة الخاصة بمتجر فولت...");
            // هنا يتم الربط مع API الدفع الخاص بك
        }
    }
</script>

</body>
</html>
