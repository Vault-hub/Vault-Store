<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAULT STORE | المتجر البنفسجي 💜</title>
    <style>
        :root { --p: #8b5cf6; --p-light: #f5f3ff; --text: #1f2937; --bg: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; transition: 0.3s; }
        
        header { background: #fff; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--p-light); position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.1); }
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--p); letter-spacing: 1px; }
        nav a { color: var(--text); text-decoration: none; margin: 0 15px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        nav a:hover { color: var(--p); }
        
        .admin-btn { background: var(--p-light); color: var(--p); border: 1px solid var(--p); padding: 8px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; }

        .page { display: none; padding: 40px 5%; animation: fadeIn 0.5s ease; }
        .active { display: block; }

        .hero { text-align: center; padding: 60px 20px; background: linear-gradient(180deg, var(--p-light) 0%, #fff 100%); border-radius: 0 0 50px 50px; }
        .hero h1 { font-size: 2.8rem; color: #111; margin-bottom: 10px; }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; }
        .item { background: #fff; border: 1px solid var(--p-light); padding: 20px; border-radius: 25px; transition: 0.4s; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .item:hover { transform: translateY(-10px); border-color: var(--p); box-shadow: 0 15px 30px rgba(139, 92, 246, 0.15); }
        .item img { width: 100%; height: 200px; object-fit: cover; border-radius: 20px; margin-bottom: 15px; }
        
        .price { font-size: 1.5rem; font-weight: 800; color: var(--p); margin: 10px 0; }
        .buy-btn { background: var(--p); color: white; border: none; padding: 12px; border-radius: 15px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        .buy-btn:hover { background: #7c3aed; transform: scale(1.02); }

        /* نافذة الدفع */
        #pay-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center; backdrop-filter: blur(5px); }
        .modal-content { background:white; padding:30px; border-radius:30px; width:90%; max-width:400px; text-align:center; position: relative; }
        .pay-option { border: 2px solid #eee; padding: 15px; border-radius: 15px; margin: 10px 0; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; }
        .pay-option:hover { border-color: var(--p); background: var(--p-light); }
        .apple-pay { background: black; color: white; border: none; }

        /* لوحة التحكم */
        .admin-box { max-width: 900px; margin: 0 auto; background: white; border: 1px solid #eee; padding: 30px; border-radius: 30px; }
        .order-card { background: var(--p-light); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-right: 5px solid var(--p); display: flex; justify-content: space-between; align-items: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div class="logo">VAULT 💜</div>
    <nav>
        <a onclick="showPage('home')">الرئيسية</a>
        <a onclick="showPage('shop-page')">المتجر</a>
        <button class="admin-btn" onclick="checkOwner()">المالك 🔐</button>
    </nav>
</header>

<div id="home" class="page active">
    <div class="hero">
        <h1>متجر <span style="color:var(--p)">فولت</span> الفاخر</h1>
        <p>الأفضل.. الأسرع.. والأكثر أماناً ⚡</p>
        <button class="buy-btn" style="width: 200px; margin-top: 20px;" onclick="showPage('shop-page')">دخول المتجر</button>
    </div>
</div>

<div id="shop-page" class="page">
    <h2 style="text-align:center; color:var(--p)">قائمة المنتجات 🛒</h2>
    <div id="products-display" class="container"></div>
</div>

<div id="admin-page" class="page">
    <div class="admin-box">
        <h2 style="color:var(--p)">لوحة المالك 🛠️</h2>
        <div id="orders-section">
            <h3>طلبات الشراء الواردة 📥</h3>
            <div id="orders-list"></div>
            <button onclick="clearOrders()" style="color:red; background:none; border:none; cursor:pointer;">مسح جميع الطلبات 🗑️</button>
        </div>
        <hr style="margin: 30px 0;">
        <h3>إضافة منتج جديد</h3>
        <input type="text" id="p-name" placeholder="اسم المنتج">
        <input type="number" id="p-price" placeholder="السعر">
        <input type="text" id="p-img" placeholder="رابط الصورة">
        <button class="buy-btn" onclick="addNewProduct()">إضافة للمتجر</button>
    </div>
</div>

<div id="pay-modal">
    <div class="modal-content">
        <h3>اختر طريقة الدفع 💸</h3>
        <p id="target-item" style="color:var(--p); font-weight:bold;"></p>
        <div class="pay-option apple-pay" onclick="confirmPay('Apple Pay')"> Pay</div>
        <div class="pay-option" onclick="confirmPay('مدى - mada')">💳 بطاقة مدى</div>
        <div class="pay-option" onclick="confirmPay('تحويل بنكي')">🏦 تحويل بنكي</div>
        <button onclick="closeModal()" style="margin-top:15px; background:none; border:none; color:#777; cursor:pointer;">إلغاء</button>
    </div>
</div>

<script>
    const OWNER_EMAIL = "aawaf50@gmail.com";
    const OWNER_PASS = "Open208!10017@27@9";

    let products = JSON.parse(localStorage.getItem('v_products')) || [];
    let orders = JSON.parse(localStorage.getItem('v_orders')) || [];
    let currentItem = "";

    function render() {
        const display = document.getElementById('products-display');
        const ordersList = document.getElementById('orders-list');
        display.innerHTML = ''; ordersList.innerHTML = '';

        products.forEach(p => {
            display.innerHTML += `
                <div class="item">
                    <img src="${p.img || 'https://via.placeholder.com/300x200?text=Vault+Store'}" alt="product">
                    <h3>${p.name}</h3>
                    <div class="price">${p.price} SAR</div>
                    <button class="buy-btn" onclick="openPay('${p.name}')">شراء الآن</button>
                </div>`;
        });

        orders.forEach(o => {
            ordersList.innerHTML += `
                <div class="order-card">
                    <div>
                        <strong>المنتج: ${o.item}</strong><br>
                        <small>الطريقة: ${o.method} | الوقت: ${o.time}</small>
                    </div>
                    <span style="color:green; font-weight:bold;">جديد ✨</span>
                </div>`;
        });
        localStorage.setItem('v_products', JSON.stringify(products));
        localStorage.setItem('v_orders', JSON.stringify(orders));
    }

    function openPay(name) {
        currentItem = name;
        document.getElementById('target-item').innerText = name;
        document.getElementById('pay-modal').style.display = 'flex';
    }

    function confirmPay(method) {
        const newOrder = {
            item: currentItem,
            method: method,
            time: new Date().toLocaleString('ar-SA')
        };
        orders.push(newOrder);
        localStorage.setItem('v_orders', JSON.stringify(orders));
        
        alert("تم تسجيل طلبك بنجاح! جاري تحويلك للمالك لتأكيد الدفع.");
        // هنا تقدر تحط رابط الديسكورد حقك
        window.location.href = "https://discord.gg/YOUR_INVITE_LINK"; 
    }

    function addNewProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const img = document.getElementById('p-img').value;
        if(name && price) {
            products.push({name, price, img});
            render();
            alert("تمت الإضافة!");
        }
    }

    function checkOwner() {
        const email = prompt("بريد المالك:");
        if (email === OWNER_EMAIL) {
            const pass = prompt("كلمة المرور:");
            if (pass === OWNER_PASS) showPage('admin-page');
        }
    }

    function clearOrders() { if(confirm("حذف جميع الطلبات؟")) { orders = []; render(); } }
    function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function closeModal() { document.getElementById('pay-modal').style.display = 'none'; }

    render();
</script>

</body>
</html>
